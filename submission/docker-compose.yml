version: '3.8'

services:
  lb:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "50MB"

  api1:
    image: scoobiii/rinha-c:latest
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"

  api2:
    image: scoobiii/rinha-c:latest
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "150MB"
