worker_processes      1;
worker_rlimit_nofile  65535;
error_log             /dev/stderr warn;
# No Termux, o PID deve ficar em um lugar acessível
pid                   /data/data/com.termux/files/usr/var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    access_log  off;
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout         65;
    keepalive_requests        10000;
    reset_timedout_connection on;

    upstream api {
        # Alterado para o diretório temporário do Termux
        server unix:/data/data/com.termux/files/usr/tmp/api1.sock;
        server unix:/data/data/com.termux/files/usr/tmp/api2.sock;
        keepalive 128;
    }

    server {
        # Removido backlog=4096 pois o kernel do Android pode não aceitar sem root
        listen 9999;

        location / {
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
            proxy_buffering off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout invalid_header http_502 http_503;
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            
            # Garante que headers de erro não travem a conexão
            proxy_next_upstream error timeout http_500;
        }
    }
}
